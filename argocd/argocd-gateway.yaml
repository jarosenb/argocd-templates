apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: argocd-gateway
  namespace: argocd
spec:
  gatewayClassName: traefik
  listeners:
    - name: web
      hostname: argocd.k3s-local.test
      port: 8000
      protocol: HTTP

    - name: websecure
      hostname: argocd.k3s-local.test
      port: 8443
      protocol: HTTPS
      tls:
        mode: Terminate
        certificateRefs:
          - group: ""
            kind: Secret
            name: argocd-server-tls

---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: argocd-server
  namespace: argocd
spec:
  hostnames:
    - argocd.k3s-local.test
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: argocd-gateway
      namespace: argocd
  rules:
    - backendRefs:
        - group: ""
          kind: Service
          name: argocd-server
          port: 80
          weight: 1
      matches:
        - headers:
            - name: Content-Type
              type: Exact
              value: application/grpc
          path:
            type: PathPrefix
            value: /
    - backendRefs:
        - group: ""
          kind: Service
          name: argocd-server
          port: 80
          weight: 1
      matches:
        - path:
            type: PathPrefix
            value: /
