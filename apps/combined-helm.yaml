apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: combined-helm
  namespace: argocd
spec:
  destination:
    namespace: default
    server: https://kubernetes.default.svc
  project: default
  source:
    path: helm-kustomize-hybrid
    repoURL: https://github.com/jarosenb/argocd-templates.git
    targetRevision: HEAD
    kustomize:
      enableHelm: true
