apiVersion: apps/v1
kind: Deployment
metadata:
  name: componentized-nginx
spec:
  template:
    spec:
      containers:
        - name: core-nginx
          image: nginx:stable-alpine
          imagePullPolicy: Always
          ports:
            - containerPort: 80
          volumeMounts:
            - name: nginx-shared-data
              mountPath: /etc/nginx/shared-data
          env:
            - name: ARGOCD_APP_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.annotations['argocd-app-name']
          envFrom:
            - secretRef:
                name: testsecret01

      initContainers:
        - name: init-core-nginx
          image: nginx:stable-alpine
          imagePullPolicy: Always
          command: ["/bin/sh", "-c", 'echo "$FOO" > /etc/nginx/shared-data/initfile.txt']
          volumeMounts:
            - name: nginx-shared-data
              mountPath: /etc/nginx/shared-data
          envFrom:
            - secretRef:
                name: testsecret01