apiVersion: apps/v1
kind: Deployment
spec:
  template:
    spec:
      containers:
        - name: extra-nginx
          image: nginx:stable-alpine
          imagePullPolicy: Always
          ports:
            - containerPort: 8081
          volumeMounts:
            - name: extra-nginx-conf
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf

            - name: nginx-shared-data
              mountPath: /etc/nginx/shared-data

          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              cpu: 100m
              memory: 128Mi
      volumes:
        - name: extra-nginx-conf
          configMap:
            name: extra-conf-file-cm
