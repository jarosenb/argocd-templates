apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: miniportal
  namespace: argocd
spec:
  destination:
    namespace: default
    server: https://kubernetes.default.svc
  project: default
  source:
    path: miniportal
    repoURL: https://github.com/jarosenb/argocd-templates.git
    targetRevision: no-namespace
