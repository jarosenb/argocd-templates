apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: apps
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/jarosenb/argocd-templates.git
    path: apps
    targetRevision: no-namespace
  destination:
    server: https://kubernetes.default.svc
    namespace: default
