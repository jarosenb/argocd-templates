apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argocd
  namespace: argocd
spec:
  project: platform-infrastructure
  source:
    path: argocd
    repoURL: https://github.com/jarosenb/argocd-templates.git
    targetRevision: no-namespace
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    syncOptions:
      - ServerSideApply=true
