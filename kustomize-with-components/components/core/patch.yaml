spec:
  template:
    spec:
      containers:
        - name: core-nginx
          image: nginx:stable-alpine
          imagePullPolicy: Always
          ports:
            - containerPort: 80
          volumeMounts:
            - name: nginx-shared-data
              mountPath: /etc/nginx/shared-data
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              cpu: 100m
              memory: 128Mi

      initContainers:
        - name: init-core-nginx
          image: nginx:stable-alpine
          imagePullPolicy: Always
          command: ['touch', '/etc/nginx/shared-data/initfile.txt']
          volumeMounts:
            - name: nginx-shared-data
              mountPath: /etc/nginx/shared-data
