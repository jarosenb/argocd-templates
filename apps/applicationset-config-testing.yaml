apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: applicationset-config-testing
  namespace: argocd
spec:
  goTemplate: true
  generators:
    - list:
        elements:
          - name: kustomize-with-components
            path: kustomize-with-components

          - name: kustomize-local-helm
            path: kustomize-local-helm

          - name: shared-volume-testing
            path: shared-volume-testing

          - name: env-config-testing
            path: env-config-testing
  template:
    metadata:
      name: "{{.name}}"
      namespace: argocd
    spec:
      project: test-apps
      source:
        repoURL: https://github.com/jarosenb/argocd-templates.git
        targetRevision: '{{ default "HEAD" .release}}'
        path: "{{.path}}"
        kustomize:
          namePrefix: "{{.name}}-"
          commonAnnotations:
            argocd-app-name: "{{.name}}-"
      destination:
        namespace: default
        server: https://kubernetes.default.svc
