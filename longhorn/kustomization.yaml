apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: longhorn-system

helmCharts:
  - name: longhorn
    repo: https://charts.longhorn.io
    version: 1.11.1
    releaseName: longhorn
    namespace: longhorn-system
    valuesInline:
      defaultSettings:
        defaultReplicaCount: 1
      persistence:
        defaultClass: true

resources:
  - traefik-gateway.yaml
