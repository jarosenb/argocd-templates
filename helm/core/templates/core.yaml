apiVersion: apps/v1
kind: Deployment
metadata:
  name: core-nginx
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: core-nginx
  template:
    metadata:
      labels:
        app: core-nginx
    spec:
      containers:
        - name: core-nginx
          image: nginx:stable-alpine
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80

          envFrom:
            - configMapRef:
                name: {{ include "argo-helm-core.fullname" . }}-config


apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "argo-helm-core.fullname" . }}-config
data:
{{- range $key, $value := .Values.appConfig }}
  {{ $key }}: {{ $value | quote }}
{{- end }}


