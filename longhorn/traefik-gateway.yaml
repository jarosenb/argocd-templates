apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: longhorn-gateway
  namespace: longhorn-system
spec:
  gatewayClassName: traefik
  listeners:
    - name: longhorn-server
      hostname: k3s-local.test
      port: 8001
      protocol: HTTP

---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: longhorn-router
  namespace: longhorn-system
spec:
  parentRefs:
    - name: longhorn-gateway
      namespace: longhorn-system
  hostnames:
    - k3s-local.test
  rules:
    # Regular HTTP traffic
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: longhorn-frontend
          port: 80
