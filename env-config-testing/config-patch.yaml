apiVersion: apps/v1
kind: Deployment
metadata:
  name: env-configured-nginx
spec:
  template:
    spec:
      containers:
        - name: core-nginx
          volumeMounts:
            - name: conf-file-volume
              mountPath: /etc/nginx/conf.d/testconf.conf
              subPath: testconf.conf
      volumes:
        - name: conf-file-volume
          configMap:
            name: conf-file-cm