apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: env-config-testing
  namespace: argocd
spec:
  destination:
    namespace: default
    server: https://kubernetes.default.svc
  project: default
  source:
    path: env-config-testing
    repoURL: https://github.com/jarosenb/argocd-templates.git
    targetRevision: HEAD
  syncPolicy:
    automated:
      prune: true
      enabled: true